<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <title>Sistem Inventaris BHP KPU</title>
</head>
<body class="bg-gray-100">

    <div id="login-page" class="flex h-screen items-center justify-center">
        <div class="bg-white p-8 rounded shadow-md w-96">
            <h2 class="text-2xl font-bold mb-4">Login BHP KPU</h2>
            <input id="login-username" type="text" placeholder="Username" class="w-full p-2 border mb-2">
            <input id="login-password" type="password" placeholder="Password" class="w-full p-2 border mb-4">
            <button onclick="login()" class="w-full bg-blue-600 text-white p-2">Masuk</button>
        </div>
    </div>

    <div id="main-system" class="hidden flex h-screen">
        <aside class="w-64 bg-slate-900 text-white p-4">
            <h1 class="font-bold mb-6">Sistem BHP KPU</h1>
            <p id="user-display" class="text-sm text-gray-400 mb-6"></p>
            <button onclick="showMenu('master-data')" class="block w-full text-left p-2 hover:bg-slate-700">Master Data BHP</button>
            <button onclick="logout()" class="mt-10 text-red-400">Keluar</button>
        </aside>

        <main class="flex-1 p-8">
            <div id="master-data" class="hidden">
                <h2 class="text-xl font-bold mb-4">Master Data Barang</h2>
                <div class="flex gap-2 mb-4">
                    <input id="nama-barang" placeholder="Nama Barang" class="border p-2">
                    <input id="stok-barang" type="number" placeholder="Stok" class="border p-2">
                    <button onclick="tambahBarang()" class="bg-green-600 text-white px-4">Tambah</button>
                </div>
                <table class="w-full bg-white border">
                    <thead><tr><th class="p-2 border">Nama</th><th class="p-2 border">Stok</th></tr></thead>
                    <tbody id="table-barang"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const supabase = supabase.createClient('https://pfuwxyofnrhnjdrelzbk.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBmdXd4eW9mbnJobmpkcmVsemJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxODMxNTYsImV4cCI6MjA5Nzc1OTE1Nn0.uYqKzWVJaHuq0vl69ghtYt05lXbrSy4Ehx6byfuNSt0');

        async function login() {
            const user = document.getElementById('login-username').value;
            const pass = document.getElementById('login-password').value;
            const { data, error } = await supabase.from('users_view').select('*').eq('username', user).eq('password_plain', pass).single();

            if (data) {
                document.getElementById('login-page').classList.add('hidden');
                document.getElementById('main-system').classList.remove('hidden');
                document.getElementById('user-display').innerText = `Login Sebagai: ${data.nama_lengkap} (${data.role.toUpperCase()})`;
                loadDataBarang();
            } else {
                alert('Username/Password Salah!');
            }
        }

        async function loadDataBarang() {
            const { data } = await supabase.from('barang').select('*');
            const tbody = document.getElementById('table-barang');
            tbody.innerHTML = data.map(b => `<tr><td class="p-2 border">${b.nama_barang}</td><td class="p-2 border">${b.stok_sekarang}</td></tr>`).join('');
        }

        async function tambahBarang() {
            const nama = document.getElementById('nama-barang').value;
            const stok = document.getElementById('stok-barang').value;
            await supabase.from('barang').insert([{ nama_barang: nama, stok_sekarang: stok, satuan: 'pcs' }]);
            alert('Berhasil!');
            loadDataBarang();
        }

        function showMenu(id) {
            document.querySelectorAll('main > div').forEach(div => div.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
